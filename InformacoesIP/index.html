<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de IP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>IP Table</h1>
        
        <div class="ip-form">
            <input type="text" id="ip" placeholder="IP">
            <input type="text" id="mask" placeholder="Mask">
            <input type="text" id="version" placeholder="Version">
            <button id="add-btn">Add</button>
        </div>

        <table id="ip-table">
            <thead>
                <tr>
                    <th>IP</th>
                    <th>Mask</th>
                    <th>Version</th>
                    <th class="actions-header">Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
